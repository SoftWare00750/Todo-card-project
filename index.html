<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container" role="main">
  <article
    class="todo-card"
    data-testid="test-todo-card"
    aria-labelledby="todo-title"
  >

    <header class="todo-header">
      <div class="title-row">
        <label for="todo-checkbox">
          <input
            type="checkbox"
            id="todo-checkbox"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
        </label>

        <h2 data-testid="test-todo-title" id="todo-title">
          Complete Frontend Task
        </h2>
      </div>

      <div class="badges">
        <span data-testid="test-todo-priority" class="badge priority high">
          High
        </span>
        <span data-testid="test-todo-status" class="badge status" id="status-text">
          Pending
        </span>
      </div>
    </header>

    <p data-testid="test-todo-description">
      Build a fully accessible and testable Todo card component for Stage 0.
    </p>

    <div class="time-section">
      <time data-testid="test-todo-due-date" datetime="2026-04-20T18:00:00Z">
        Due Apr 20, 2026
      </time>

      <time data-testid="test-todo-time-remaining" id="time-remaining">
        Calculating...
      </time>
    </div>

    <ul data-testid="test-todo-tags" class="tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li>design</li>
    </ul>

    <footer class="todo-footer">
      <button data-testid="test-todo-edit-button" class="btn">
        Edit
      </button>

      <button data-testid="test-todo-delete-button" class="btn delete">
        Delete
      </button>
    </footer>

  </article>
</main>

<!-- FIXED: defer added -->
<script src="script.js" defer></script>
</body>
</html>
