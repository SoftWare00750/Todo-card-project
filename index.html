<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container">
  <article class="todo-card" data-testid="test-todo-card">

    <header class="todo-header">
      <h2 data-testid="test-todo-title" id="todo-title">
        Complete Frontend Task
      </h2>

      <div class="status-priority">
        <span data-testid="test-todo-priority" class="priority high">High</span>
        <span data-testid="test-todo-status" class="status" id="status-text">
          Pending
        </span>
      </div>
    </header>

    <p data-testid="test-todo-description">
      Build a fully accessible and testable Todo card component for Stage 0.
    </p>

    <div class="time-section">
      <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z">
        Due Mar 1, 2026
      </time>

      <time data-testid="test-todo-time-remaining" id="time-remaining">
        Calculating...
      </time>
    </div>

    <div data-testid="test-todo-tags" class="tags">
      <span data-testid="test-todo-tag-work">work</span>
      <span data-testid="test-todo-tag-urgent">urgent</span>
      <span>design</span>
    </div>

    <footer class="todo-footer">
      <label>
        <input type="checkbox" data-testid="test-todo-complete-toggle" id="checkbox"/>
        Mark as done
      </label>

      <div class="actions">
        <button data-testid="test-todo-edit-button">Edit</button>
        <button data-testid="test-todo-delete-button">Delete</button>
      </div>
    </footer>

  </article>
</main>

<script src="script.js"></script>
</body>
</html>
